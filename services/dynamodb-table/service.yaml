id: dynamodb-table
name: DynamoDB Table
category: database
status: live
classification_min: poc
classification_max: critical-path
description: On-demand key/value table with PITR and encryption at rest.
auto_approvable: true
required_fields: [name, pk_name]
provisioner:
  connector: terraform
  config:
    module: aws/dynamodb-table
    cloud: aws
cost:
  model: usage
  estimated_monthly_usd: 8.0
  source:
    type: aws-cost-explorer
access_levels:
  read: [dynamodb:GetItem, dynamodb:BatchGetItem, dynamodb:Query, dynamodb:Scan]
  write: [dynamodb:GetItem, dynamodb:BatchGetItem, dynamodb:Query, dynamodb:Scan, dynamodb:PutItem, dynamodb:UpdateItem, dynamodb:DeleteItem, dynamodb:BatchWriteItem]
grant:
  module: aws/iam-grant
  principal_kind: iam-role
tags: [database, aws]
documentation: services/dynamodb-table/README.md
