id: rds-postgres
name: RDS PostgreSQL
category: database
status: live
classification_min: poc
classification_max: critical-path
description: Managed PostgreSQL database. Self-service at low classifications when within budget; classification + cost caps gate it, not a blanket review.
auto_approvable: true
required_fields: [name]
provisioner:
  connector: terraform
  config:
    module: aws/rds-postgres
    cloud: aws
secret_outputs: [master_password, connection_url]
cost:
  model: usage
  estimated_monthly_usd: 120.0
  source:
    type: aws-cost-explorer
tags: [database, aws, managed]
documentation: services/rds-postgres/README.md
