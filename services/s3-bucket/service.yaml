id: s3-bucket
name: S3 Bucket
category: storage
status: live
classification_min: poc
classification_max: critical-path
description: Private, versioned, encrypted object-storage bucket.
auto_approvable: true
required_fields: [name]
provisioner:
  connector: terraform
  config:
    module: aws/s3-bucket
    cloud: aws
cost:
  model: usage
  estimated_monthly_usd: 5.0
  source:
    type: aws-cost-explorer
access_levels:
  read: [s3:GetObject, s3:ListBucket, s3:GetBucketLocation]
  write: [s3:GetObject, s3:ListBucket, s3:GetBucketLocation, s3:PutObject, s3:DeleteObject]
grant:
  module: aws/iam-grant
  principal_kind: iam-role
tags: [storage, aws]
documentation: services/s3-bucket/README.md
